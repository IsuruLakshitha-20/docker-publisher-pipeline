name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 1: Log into your cloud Docker Hub account using our encrypted secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 2: Set up the official Docker build environment in the cloud runner
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Automatically build the Dockerfile and push it to the live registry!
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Swap out 'YOUR-DOCKERHUB-USERNAME' with your actual Docker Hub name below!
          tags: isurulakshitha/docker-sandbox-app:latest